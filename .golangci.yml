run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  gosec:
    excludes:
      - G104  # Unhandled errors (too noisy for now)

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
