version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - errorlint
    - nilerr
    - rowserrcheck
    - sqlclosecheck
    - gosec
    - gocritic
    - misspell
    - unconvert
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
    gosec:
      excludes:
        - G104
        - G204
        - G304
        - G306
    staticcheck:
      checks:
        - all
        - "-SA1019"
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - errorlint
      - path: internal/db/migrations/
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
