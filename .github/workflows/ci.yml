name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          only-new-issues: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          check-latest: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          CGO_ENABLED: 1

      - name: Coverage report
        run: go tool cover -func=coverage.out

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Install Dolt
        run: curl -fsSL https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash

      - name: Build and install binaries
        run: make install

      - name: Smoke test – ct init, daemon up, gt status
        run: |
          set -e
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"

          ct init --non-interactive

          ct daemon &
          DAEMON_PID=$!
          sleep 5

          gt status | grep "=== Agents ==="

          kill "$DAEMON_PID" 2>/dev/null || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          check-latest: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
